    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f4f4f5; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
        
        /* Utility to hide scrollbar but allow scrolling in filters */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle grid background for admin charts */
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, #f4f4f5 1px, transparent 1px),
                linear-gradient(to bottom, #f4f4f5 1px, transparent 1px);
        }
    </style>
</head>

        const app = {

            formatMoney: (amount) => {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
            },

            // Layout switching logic
            navigate: (view, param = null) => {
                app.currentView = view;
                app.currentLayout = view.startsWith('admin') ? 'admin' : 'storefront';
                
                const root = document.getElementById('root');
                
                // Set body scroll based on layout (Admin is fixed height, Storefront scrolls)
                if (app.currentLayout === 'admin') {
                    document.body.classList.add('overflow-hidden');
                    document.body.classList.remove('overflow-auto');
                } else {
                    document.body.classList.remove('overflow-hidden');
                    document.body.classList.add('overflow-auto');
                    window.scrollTo(0, 0);
                }

                // Render selected layout and view
                if (app.currentLayout === 'admin') {
                    root.innerHTML = layouts.admin(views[view](param));
                } else {
                    root.innerHTML = layouts.storefront(views[view](param));
                    app.updateCartBadge();
                }

                // Trigger reflow for animations
                const container = document.getElementById('view-container');
                if (container) {
                    container.classList.remove('fade-in');
                    void container.offsetWidth;
                    container.classList.add('fade-in');
                }
            },

            // Cart functions for Storefront
            addToCart: (productId) => {
                const product = products.find(p => p.id === productId);
                const existingItem = app.cart.find(item => item.id === productId);
                if (existingItem) {
                    existingItem.quantity += 1;
                } else {
                    app.cart.push({ ...product, quantity: 1 });
                }
                app.updateCartBadge();
                showToast(`Added ${product.name} to requisition.`);
            },
            updateCartQuantity: (productId, change) => {
                const itemIndex = app.cart.findIndex(item => item.id === productId);
                if (itemIndex > -1) {
                    app.cart[itemIndex].quantity += change;
                    if (app.cart[itemIndex].quantity <= 0) {
                        app.cart.splice(itemIndex, 1);
                    }
                }
                app.navigate('cart'); 
            },
            updateCartBadge: () => {
                const badge = document.getElementById('cart-count');
                if (!badge) return;
                const totalItems = app.cart.reduce((sum, item) => sum + item.quantity, 0);
                if (totalItems > 0) {
                    badge.textContent = totalItems;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
        };

        // UI Helpers
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            if(menu) {
                menu.classList.toggle('hidden');
                menu.classList.toggle('flex');
            }
        }

        function getStatusLabelHTML(status, context = 'store') {
            if (context === 'admin') {
                switch(status.toLowerCase()) {
                    case 'pre-order': return `<span class="bg-zinc-900 text-white text-[10px] font-display uppercase tracking-widest px-2 py-1">Pre-order</span>`;
                    case 'waitlist': return `<span class="bg-zinc-200 text-zinc-600 text-[10px] font-display uppercase tracking-widest px-2 py-1">Waitlist</span>`;
                    case 'in-stock': return `<span class="border border-zinc-300 text-zinc-600 text-[10px] font-display uppercase tracking-widest px-2 py-1">In Stock</span>`;
                    case 'processing': return `<span class="border border-zinc-300 text-zinc-600 text-[10px] font-display uppercase tracking-widest px-2 py-1">Processing</span>`;
                    case 'shipped': return `<span class="text-zinc-400 text-[10px] font-display uppercase tracking-widest px-2 py-1"><i class="fa-solid fa-check mr-1"></i> Shipped</span>`;
                    default: return '';
                }
            } else {
                 switch(status.toLowerCase()) {
                    case 'pre-order': return `<span class="bg-accent text-white text-[10px] font-display uppercase tracking-widest px-2 py-1">Pre-order</span>`;
                    case 'waitlist': return `<span class="bg-zinc-800 text-white text-[10px] font-display uppercase tracking-widest px-2 py-1">Waitlist</span>`;
                    case 'in-stock': return `<span class="border border-zinc-300 text-zinc-600 text-[10px] font-display uppercase tracking-widest px-2 py-1">In Stock</span>`;
                    default: return '';
                }
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-zinc-900 text-white px-6 py-4 shadow-xl z-50 font-display tracking-wide text-sm flex items-center gap-3 transform translate-y-full opacity-0 transition-all duration-300';
            toast.innerHTML = `<i class="fa-solid fa-check text-white"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-full', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
